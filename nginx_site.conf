server {
    listen 80;
    listen [::]:80;
    server_name bilalaboqura.com www.bilalaboqura.com;

    # Redirect HTTP → HTTPS
    return 301 https://bilalaboqura.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.bilalaboqura.com;

    ssl_certificate     /etc/letsencrypt/live/bilalaboqura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bilalaboqura.com/privkey.pem;

    # Non-www canonical redirect
    return 301 https://bilalaboqura.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bilalaboqura.com;

    ssl_certificate     /etc/letsencrypt/live/bilalaboqura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bilalaboqura.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/bilalaboqura/html;
    index index.html;

    # ─── Gzip Compression (boosts page speed & Core Web Vitals) ─────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/xml
        application/json application/ld+json
        image/svg+xml
        font/woff font/woff2;

    # ─── Security Headers (Google evaluates HTTPS quality) ──────────────────
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── SPA fallback (React Router) ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── SEO files — no cache, always fresh ─────────────────────────────────
    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type  "application/xml";
        try_files $uri =404;
    }

    location = /llms.txt {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type  "text/plain; charset=utf-8";
        try_files $uri =404;
    }

    # ─── Static assets — aggressive caching for Lighthouse scores ───────────
    location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|mp4|webm|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ─── HTML — short cache so Google always re-fetches updated meta ────────
    location ~* \.html$ {
        expires     1h;
        add_header  Cache-Control "public, no-cache, must-revalidate";
    }
}

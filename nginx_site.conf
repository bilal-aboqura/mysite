server {
    listen 80;
    listen [::]:80;
    server_name bilalaboqura.com www.bilalaboqura.com;

    # Redirect HTTP → HTTPS
    return 301 https://bilalaboqura.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.bilalaboqura.com;

    ssl_certificate     /etc/letsencrypt/live/bilalaboqura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bilalaboqura.com/privkey.pem;

    # Non-www canonical redirect
    return 301 https://bilalaboqura.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bilalaboqura.com;

    ssl_certificate     /etc/letsencrypt/live/bilalaboqura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bilalaboqura.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/bilalaboqura/html;
    index index.html;

    # ─── Gzip Compression (boosts page speed & Core Web Vitals) ─────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/xml
        application/json application/ld+json
        image/svg+xml
        font/woff font/woff2;

    # ─── Security Headers (Google evaluates HTTPS quality) ──────────────────
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── SPA fallback (React Router) ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── SEO files — no cache, always fresh ─────────────────────────────────
    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type  "application/xml";
        try_files $uri =404;
    }

    location = /llms.txt {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type  "text/plain; charset=utf-8";
        try_files $uri =404;
    }

    # ─── Static assets — aggressive caching for Lighthouse scores ───────────
    location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|mp4|webm|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ─── HTML — short cache so Google always re-fetches updated meta ────────
    location ~* \.html$ {
        expires     1h;
        add_header  Cache-Control "public, no-cache, must-revalidate";
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# PROPOSALS SUBDOMAIN — proposals.bilalaboqura.com
# Serves the private proposal viewer at /proposals/
# NOTE: Before enabling, re-issue your SSL cert to include this subdomain:
#   certbot certonly --nginx -d bilalaboqura.com -d www.bilalaboqura.com -d proposals.bilalaboqura.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name proposals.bilalaboqura.com;

    # Redirect HTTP → HTTPS
    return 301 https://proposals.bilalaboqura.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name proposals.bilalaboqura.com;

    # ── Re-use the same cert after adding the subdomain to it ────────────────
    ssl_certificate     /etc/letsencrypt/live/bilalaboqura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bilalaboqura.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve from the /proposals sub-folder of the main site
    root  /var/www/bilalaboqura/html/proposals;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # No-index: proposals are private, never let Google crawl them
    add_header X-Robots-Tag              "noindex, nofollow" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── Clean slug routing ────────────────────────────────────────────────────
    # proposals.bilalaboqura.com/edumize  →  serves /edumize.html directly
    # proposals.bilalaboqura.com/         →  index.html (router page)
    location / {
        # First try the exact path, then try adding .html, then fallback to index
        try_files $uri $uri.html $uri/ /index.html;
    }

    # ── Static assets — aggressive caching ───────────────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|otf|eot|webp|jpg|jpeg|png|gif|svg|ico)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── HTML — short cache so updates show immediately ────────────────────────
    location ~* \.html$ {
        expires     0;
        add_header  Cache-Control "no-store, must-revalidate";
    }
}

